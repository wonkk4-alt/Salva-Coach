(function(){
  function jfEvalScript(code, label){
    var s=document.createElement('script');
    s.text=String(code||'')+'\n//# sourceURL='+label;
    document.head.appendChild(s);
    setTimeout(function(){ try{s.remove();}catch(e){} }, 0);
  }

  function jfLoadRemoteScript(url, timeoutMs){
    return new Promise(function(resolve, reject){
      var done=false;
      var s=document.createElement('script');
      var t=setTimeout(function(){
        if(done) return;
        done=true;
        try{s.remove();}catch(e){}
        reject(new Error('timeout '+url));
      }, timeoutMs||4500);
      s.async=true;
      s.crossOrigin='anonymous';
      s.src=url;
      s.onload=function(){
        if(done) return;
        done=true;
        clearTimeout(t);
        resolve(true);
      };
      s.onerror=function(){
        if(done) return;
        done=true;
        clearTimeout(t);
        try{s.remove();}catch(e){}
        reject(new Error('error '+url));
      };
      document.head.appendChild(s);
    });
  }

  async function jfLoadCachedScript(cacheKey, urls, testFn, label){
    try{
      if(testFn()) return true;
      var cached=localStorage.getItem(cacheKey);
      if(cached){
        jfEvalScript(cached, label+'-cached.js');
        if(testFn()) return true;
      }
    }catch(e){}

    for(var i=0;i<urls.length;i++){
      var url=urls[i];
      try{
        var res=await fetch(url,{cache:'force-cache', mode:'cors'});
        if(!res.ok) throw new Error('HTTP '+res.status);
        var txt=await res.text();
        try{ localStorage.setItem(cacheKey, txt); }catch(e){}
        jfEvalScript(txt, label+'.js');
        if(testFn()) return true;
      }catch(e){
        console.warn('fetch script fallback:', url, e);
      }
    }

    for(var j=0;j<urls.length;j++){
      try{
        await jfLoadRemoteScript(urls[j], 4500);
        if(testFn()) return true;
      }catch(e){
        console.warn('script tag fallback:', urls[j], e);
      }
    }
    throw new Error('No se pudo cargar '+label);
  }

  window.__jfReactPromise = jfLoadCachedScript(
    'jf_cache_react_18_prod_v2',
    [
      'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js',
      'https://unpkg.com/react@18/umd/react.production.min.js'

    function(){return !!window.React;},

    return jfLoadCachedScript(

      ],
      function(){return !!window.ReactDOM;},
      'reactdom18'
    );
  });
})();

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:auto;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#050505}
#root{height:100%}
button,input,textarea,select{font-family:inherit}
textarea{resize:vertical}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#7b7f84;border-radius:2px}
.scr{height:100dvh;display:flex;flex-direction:column;background:#050505}
.scrollable{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding-bottom:100px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#101113;border-bottom:1px solid #d7dade30;flex-shrink:0;min-height:52px}
.hdr-title{font-size:13px;font-weight:900;color:#ffffff;letter-spacing:.06em;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.hdr-back{color:#d7dade;font-weight:700;font-size:13px;cursor:pointer;padding:4px 0;background:none;border:none}
.btn{width:100%;padding:13px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:linear-gradient(135deg,#d7dade,#8f9499);color:#fff;box-shadow:0 4px 15px #d7dade40}
.btn-primary:active{background:#73787d}
.btn-secondary{background:transparent;border:1.5px solid #d7dade60;color:#f8fafc}
.card{background:#101113;border:1px solid #d7dade25;border-radius:16px;padding:14px;margin-bottom:10px}
.inp{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid #d7dade30;font-size:14px;color:#f8fafc;background:#17191c;outline:none;transition:.15s}
.inp:focus{border-color:#d7dade;background:#1f2226}
.label{font-size:10px;font-weight:700;color:#f8fafc;letter-spacing:.1em;margin-bottom:5px;display:block;text-transform:uppercase}
.err{color:#ff6b6b;font-size:12px;font-weight:600;margin-top:6px;text-align:center}
.badge{display:inline-flex;align-items:center;border-radius:6px;padding:2px 7px;font-size:9px;font-weight:800}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #d7dade;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .25s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
.wfc-top{background:#050505;padding:6px 16px 8px;border-bottom:1px solid #d7dade25;text-align:center;flex-shrink:0}
.wfc-top-txt{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:20px;font-weight:800;color:#f8fafc;letter-spacing:.12em;font-style:italic;text-shadow:0 0 16px #d7dade80}

/* Optimización móvil: evita cortes y reserva espacio para controles fijos */
html,body,#root{min-height:100%}
.scr{min-height:100dvh}
.scrollable{overscroll-behavior:contain}
.save-fixed,.save-bar{
  position:fixed!important;
  bottom:0!important;
  left:0!important;
  right:0!important;
  z-index:99999!important;
  padding:12px!important;
  background:#101113!important;
  border-top:1px solid #d7dade30!important;
}


/* Corrección notas/inputs: texto siempre visible sobre fondos oscuros */
textarea,
input,
select,
.inp{
  color:#f8fafc!important;
  caret-color:#ffffff!important;
}
textarea::placeholder,
input::placeholder{
  color:#b9bec4!important;
}
.trainer-note-textarea{
  color:#ffffff!important;
  caret-color:#ffffff!important;
}

// localStorage usado como backend local



// ─── TRAINER CONFIG (color/display, separate from Auth) ────────────────────────
// El entrenador se autentica con su PIN (guardado en localStorage).
// Su rol está en users[email].role = "trainer".
// Color themes are stored in users/{uid} as well.
// For MVP, fallback color map by trainer email or name:
// ─── DB HELPERS ────────────────────────────────────────────────────────────────
// ─── FIREBASE CONFIG ─────────────────────────────────────────────────────────

var auth, db_fs;
var __jfFirebasePromise = null;

function jfLoadScriptOnce(src){
  const key = 'jf_cache_' + src.replace(/[^a-z0-9]+/gi,'_').slice(0,80);
  const testFirebase = function(){
    if(src.indexOf('firebase-app-compat')>-1) return typeof firebase !== 'undefined';
    if(src.indexOf('firebase-auth-compat')>-1) return typeof firebase !== 'undefined' && !!firebase.auth;
    if(src.indexOf('firebase-firestore-compat')>-1) return typeof firebase !== 'undefined' && !!firebase.firestore;
    return false;
  };
  function evalCode(code){
    const s=document.createElement('script');
    s.text=String(code||'')+'\\n//# sourceURL='+key+'.js';
    document.head.appendChild(s);
    setTimeout(()=>{try{s.remove();}catch(e){}},0);
  }
  async function fetchAndEval(){
    try{
      const cached=localStorage.getItem(key);
      if(cached){
        evalCode(cached);
        if(testFirebase()) return true;
      }
    }catch(e){}
    try{
      const res=await fetch(src,{cache:'force-cache', mode:'cors'});
      if(res.ok){
        const txt=await res.text();
        try{localStorage.setItem(key, txt);}catch(e){}
        evalCode(txt);
        if(testFirebase()) return true;
      }
    }catch(e){ console.warn('firebase fetch fallback:', src, e); }

    return new Promise(function(resolve, reject){
      if(document.querySelector('script[data-jf-dynamic="'+src+'"]')){
        var existing = document.querySelector('script[data-jf-dynamic="'+src+'"]');
        if(existing.getAttribute('data-loaded') === '1') return resolve(true);
        existing.addEventListener('load', function(){ resolve(true); }, {once:true});
        existing.addEventListener('error', reject, {once:true});
        return;
      }
      var s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.setAttribute('data-jf-dynamic', src);
      s.onload = function(){ s.setAttribute('data-loaded','1'); resolve(true); };
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  return fetchAndEval();
}

function jfLoadFirebaseLibs(){
  if(typeof firebase !== 'undefined' && firebase.auth && firebase.firestore) return Promise.resolve(true);
  if(__jfFirebasePromise) return __jfFirebasePromise;
  __jfFirebasePromise = jfLoadScriptOnce('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js')
    .then(function(){ return jfLoadScriptOnce('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js'); })
    .then(function(){ return jfLoadScriptOnce('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'); })
    .then(function(){ return true; });
  return __jfFirebasePromise;
}

async function ensureFirebaseReady(){
  if(auth && db_fs) return true;
  await jfLoadFirebaseLibs();
  return initFirebaseOnce();
}

function jfStartFirebaseWatch(factory, label){
  var stopped = false;
  var unsub = null;
  ensureFirebaseReady().then(function(){
    if(stopped) return;
    try{ unsub = factory(); }
    catch(e){ console.warn((label||'watch')+' setup error:', e); }
  }).catch(function(e){
    console.warn((label||'watch')+' firebase load error:', e);
  });
  return function(){
    stopped = true;
    if(typeof unsub === 'function'){
      try{ unsub(); }catch(e){}
    }
  };
}

function initFirebaseOnce(){
  if(auth && db_fs) return true;
  if(typeof firebase === 'undefined'){
    console.error('Firebase no disponible — verifica conexión a internet');
    return false;
  }
  try{
    if(!firebase.apps || !firebase.apps.length){
      firebase.initializeApp(firebaseConfig);
    }
    auth = firebase.auth();
    db_fs = firebase.firestore();
    try{ db_fs.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED }); }catch(e){}

    console.log('Firebase iniciado correctamente');
    return true;
  }catch(e){
    console.error('Firebase init error:', e);
    return false;
  }
}

// ─── DB (Firebase) ────────────────────────────────────────────────────────────
const DB = {

  // ── Auth ────────────────────────────────────────────────────────────────────
  async registerUser(email, password, name, tel){
    await ensureFirebaseReady();
    const cred = await auth.createUserWithEmailAndPassword(email.trim().toLowerCase(), password);
    const uid = cred.user.uid;
    const doc = {
      uid, email: email.trim().toLowerCase(), name, tel: tel||'', role:'user',
      accessStatus:'active', accessReason:'',
      profileStatus:'pending', objetivo:'', frecuencia:'', peso:'',
      estatura:'', imc:'', grasaVisceral:'', grasaCorporal:'', masaMuscular:'', edad:'', condicion:'', createdAt: Date.now()
    };
    await db_fs.collection('users').doc(uid).set(doc);
    return doc;
  },

  async loginUser(email, password){
    await ensureFirebaseReady();
    const cred = await auth.signInWithEmailAndPassword(email.trim().toLowerCase(), password);
    const snap = await db_fs.collection('users').doc(cred.user.uid).get();
    if(!snap.exists) throw new Error('Usuario no encontrado.');
    return snap.data();
  },

  async logoutUser(){

  // ── Rutinas ──────────────────────────────────────────────────────────────────
  async getRoutine(uid){
    await ensureFirebaseReady();
    const snap = await db_fs.collection('routines').doc(uid).get();
    const days = snap.exists ? (snap.data().days || {}) : {};
    // Filtro rápido solo con caché local. No bloquea la carga consultando Firestore.
    try{
      const localDeleted = (this.getDeletedExerciseIdsLocal ? this.getDeletedExerciseIdsLocal() : []);
      if(localDeleted && localDeleted.length){
        const deletedSet = new Set(localDeleted);
        Object.keys(days).forEach(day=>{
          if(Array.isArray(days[day])) days[day] = days[day].filter(ex=>ex && !deletedSet.has(ex.id));
        });
      }
      if(this.refreshDeletedExerciseIds) this.refreshDeletedExerciseIds();
    }catch(e){}
    return days;

  getDeletedExerciseIdsLocal(){

  cacheDeletedExerciseIds(ids){
    try{
      const clean = Array.from(new Set((ids||[]).filter(Boolean)));
      localStorage.setItem('sc_deleted_exercises', JSON.stringify(clean));
      if(typeof applyDeletedExerciseIds === 'function') applyDeletedExerciseIds(clean);
      return clean;
    }catch(e){ return ids||[]; }
  },

  async getDeletedExerciseIds(){
    await ensureFirebaseReady();
    // Lectura ligera: un solo documento, no escaneo de colecciones.
    const local = this.getDeletedExerciseIdsLocal();
    try{
      const snap = await db_fs.collection('appMeta').doc('deletedExercises').get();
      const data = snap.exists ? (snap.data() || {}) : {};
      const idsField = data.ids || {};
      const remote = Array.isArray(idsField)
        ? idsField
        : Object.keys(idsField).filter(k=>idsField[k]);
      return this.cacheDeletedExerciseIds(local.concat(remote));
    }catch(e){
      console.warn('getDeletedExerciseIds compact cache fallback:', e);
      return local;
    }
  },

  refreshDeletedExerciseIds(){
    try{ this.getDeletedExerciseIds().catch(e=>console.warn('refreshDeletedExerciseIds:', e)); }catch(e){}
  },

  watchDeletedExercises(cb){
    // Listener liviano y diferido: no toca Firestore durante el primer render.
    const emit = (ids)=>{
      const clean = this.cacheDeletedExerciseIds(ids||[]);
      if(typeof cb === 'function') cb(clean);
    };
    try{ emit(this.getDeletedExerciseIdsLocal()); }catch(e){}
    return jfStartFirebaseWatch(()=>{
      return db_fs.collection('appMeta').doc('deletedExercises').onSnapshot(snap=>{
        const data = snap.exists ? (snap.data() || {}) : {};
        const idsField = data.ids || {};
        const ids = Array.isArray(idsField)
          ? idsField
          : Object.keys(idsField).filter(k=>idsField[k]);
        emit(ids);
      }, err=>console.warn('watchDeletedExercises compact error:', err));
    }, 'watchDeletedExercises');
  },

  async deleteExerciseFromApp(exercise){
    await ensureFirebaseReady();
    const id = typeof exercise === 'string' ? exercise : (exercise && exercise.id);
    if(!id) throw new Error('Ejercicio inválido.');
    const ex = typeof exercise === 'string' ? {id} : (exercise||{});
    const deletedBy = (auth && auth.currentUser && auth.currentUser.uid) || ex.deletedBy || '';
    const tombstone = {
      id,
      name: ex.name || '',
      category: ex.category || '',
      deleted: true,
      deletedAt: Date.now(),
      deletedBy
    };

    // Documento compacto global para que todos oculten el ejercicio.
    try{
      await db_fs.collection('appMeta').doc('deletedExercises').set({
        ids: {[id]: true},
        updatedAt: Date.now()
      }, {merge:true});
    }catch(e){
      console.warn('deleteExerciseFromApp appMeta:', e);
    }

    // Tombstone compatible con versiones anteriores.
    try{
      await db_fs.collection('exInfo').doc(id).set(tombstone, {merge:true});
    }catch(e){
      console.warn('deleteExerciseFromApp exInfo:', e);
    }

    // Si era ejercicio creado por entrenador, se retira del catálogo global.
    try{ await db_fs.collection('exerciseCatalog').doc(id).delete(); }
    catch(e){ console.warn('deleteExerciseFromApp exerciseCatalog delete:', e); }

    try{
      const local = JSON.parse(localStorage.getItem('jf_custom_exercises')||'[]').filter(x=>x&&x.id!==id);
      localStorage.setItem('jf_custom_exercises', JSON.stringify(local));
      const deleted = this.getDeletedExerciseIdsLocal();
      if(!deleted.includes(id)) deleted.push(id);
      this.cacheDeletedExerciseIds(deleted);
    }catch(e){}
    return true;
  },

  async getCustomExercises(){
    await ensureFirebaseReady();
    let items=[];

    // Fuente principal: catálogo global. Lo que se cree aquí aparece para todos
    // los entrenadores/clientes que carguen el catálogo.
    try{
      const q = await db_fs.collection('exerciseCatalog').where('global','==',true).get();
      items = items.concat(q.docs.map(d=>({id:d.id,...d.data()})));
    }catch(e){
      console.warn('getCustomExercises exerciseCatalog error:', e);
    }

    // Compatibilidad con versiones anteriores que guardaban los ejercicios en exInfo.
    try{
      const q2 = await db_fs.collection('exInfo').where('isCustomExercise','==',true).get();
      items = items.concat(q2.docs.map(d=>({id:d.id,...d.data()})));
    }catch(e){
      console.warn('getCustomExercises exInfo legacy error:', e);
    }

    // Fallback local solo para que el creador vea lo recién creado si hay latencia.
    try{
      const local = JSON.parse(localStorage.getItem('jf_custom_exercises')||'[]');
      if(Array.isArray(local))items = items.concat(local);
    }catch(e){}

    const seen={};
    return items.filter(x=>x&&x.id&&!x.deleted&&!seen[x.id]&&(seen[x.id]=true));
  },

  async saveCustomExercise(exercise, info){
    await ensureFirebaseReady();
    const now=Date.now();
    const payload = {
      ...exercise,
      ...info,
      id: exercise.id,
      name: exercise.name || info.name || '',
      category: exercise.category || info.category || '',
      zone: exercise.zone || info.zone || 'Personalizado',
      machine: exercise.machine || info.machine || 'Personalizado',
      video: exercise.video || info.video || '',
      customImg: exercise.customImg || info.customImg || info.image || '',
      global: true,
      isGlobalExercise: true,
      isCustomExercise: true,
      custom: true,
      createdAt: info.createdAt || now,
      updatedAt: now
    };

    // Guardado global del catálogo: todos leen de aquí.
    // Si las reglas de Firestore aún no permiten esta colección nueva, no se rompe:
    // exInfo queda como respaldo global compatible con la versión anterior.
    try{
      await db_fs.collection('exerciseCatalog').doc(payload.id).set(payload, {merge:true});
    }catch(e){
      console.warn('saveCustomExercise exerciseCatalog fallback to exInfo:', e);
    }

    // Guardado paralelo de info del ejercicio: descripción, imagen y links usados
    // por ExerciseScreen, por la edición global existente y como respaldo global.
    await db_fs.collection('exInfo').doc(payload.id).set(payload, {merge:true});

    try{
      const local = JSON.parse(localStorage.getItem('jf_custom_exercises')||'[]').filter(x=>x&&x.id!==payload.id);
      local.push(payload);
      localStorage.setItem('jf_custom_exercises', JSON.stringify(local));
    }catch(e){}
    return payload;
  },

    return jfStartFirebaseWatch(function(){

  // ── Asistencia ────────────────────────────────────────────────────────────────
  async setAtt(uid, day, status){
    await ensureFirebaseReady();
    const week = new Date().toISOString().slice(0,7);
    // Guardar como objeto anidado real: { "2026-06": { lun: {...} } }
    // Antes se usaba una clave con punto (`2026-06.lun`), pero getWeekAtt
    // lee datos anidados; por eso el día no quedaba verde aunque se guardara.
    await db_fs.collection('attendance').doc(uid).set({
      [week]: {
        [day]: {s: status, t: Date.now()}
      }
    }, {merge: true});
    return true;
  },

  async getWeekAtt(uid){
    await ensureFirebaseReady();
    const week = new Date().toISOString().slice(0,7);
    const snap = await db_fs.collection('attendance').doc(uid).get();
    if(!snap.exists) return {};
    const data = snap.data() || {};
    const nested = data[week] || {};
    // Compatibilidad con registros viejos guardados como "2026-06.lun".
    const legacy = {};
    Object.keys(data).forEach(k=>{
      if(k.indexOf(week+'.')===0){
        legacy[k.slice(week.length+1)] = data[k];
      }
    });
    return Object.assign({}, legacy, nested);
  },

    if(!snap.exists) return null;
    const data = snap.data() || {};
    // Formato correcto: { "2026-06-07": { E001: {...} } }
    const nested = (data[date] || {})[exId];
    // Compatibilidad con logs viejos guardados como clave plana "2026-06-07.E001".
    const legacy = data[`${date}.${exId}`];
    return nested || legacy || null;
  },

function compressImageFile(file, cb, onErr){
  if(!file)return;
  const reader = new FileReader();
  reader.onerror = ()=>{ if(onErr)onErr(); };
  reader.onload = ()=>{
    const img = new Image();
    img.onerror = ()=>cb(reader.result);
    img.onload = ()=>{
      try{
        const max = 700;
        let w = img.width || max, h = img.height || max;
        if(w>h && w>max){ h = Math.round(h*max/w); w = max; }
        else if(h>=w && h>max){ w = Math.round(w*max/h); h = max; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        cb(canvas.toDataURL('image/jpeg',0.76));
      }catch(e){ cb(reader.result); }
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={error:null}; }
  static getDerivedStateFromError(e){ return {error:e}; }
  componentDidCatch(e,info){ console.error('[CRASH] error:', e, info); }
  render(){
    if(this.state.error) return React.createElement('div',{style:{padding:30,color:'#ef4444',fontWeight:700,fontSize:14}},
      'Error al renderizar: ' + this.state.error.message
    );
    return this.props.children;
  }
}

// ─── INICIALIZACIÓN ENTRENADOR SALVA COACH ────────────────────────────────
// El entrenador principal se crea automáticamente al entrar con PIN 2434.

let useState, useEffect, useRef, useCallback;

function App(){
  // authReady: false mientras Firebase verifica sesión inicial
  const [authReady, setAuthReady] = useState(false);
  const [user, setUser] = useState(null);
  const [trainer, setTrainer] = useState(null);

  // Catálogo global diferido SOLO cuando ya hay sesión.
  // Esto evita que Firebase cargue en la pantalla inicial y mantiene la app ultrarrápida.
  useEffect(()=>{
    if(!user && !trainer) return;
    let mounted=true;
    let unsub=null;
    const timer=setTimeout(async ()=>{
      try{
        const customs = await DB.getCustomExercises();
        if(mounted) mergeCustomExercises(customs);
        unsub = DB.watchCustomExercises(customs=>{
          if(mounted) mergeCustomExercises(customs||[]);
        });
      }catch(e){
        console.warn('global exercise catalog deferred load error:', e);
      }
    }, 1200);
    return ()=>{mounted=false; clearTimeout(timer); if(typeof unsub==='function')unsub();};
  },[user&&user.uid, trainer&&trainer.uid]);

  useEffect(()=>{
    // Arranque ultrarrápido: mostrar la app inmediatamente y restaurar sesión después.
    let cancelled=false;
    let unsubAuth=null;
    setAuthReady(true);

    const restoreTimer = setTimeout(async ()=>{
      try{
        await ensureFirebaseReady();
        if(cancelled || !auth) return;
        unsubAuth = auth.onAuthStateChanged(async (firebaseUser) => {
          try{
            if(firebaseUser){
              const doc = await DB.getUserByUid(firebaseUser.uid);
              if(doc && doc.role==='trainer'){
                const theme = getTrainerTheme(0);
                setTrainer({...doc,...theme});
                setUser(null);
              } else if(doc && doc.role==='user'){
                setUser(doc);
                setTrainer(null);
              }
            } else {
              const savedEmail = localStorage.getItem('sc_current_session');
              if(savedEmail){
                try{
                  const doc = await DB.getUserByEmail(savedEmail);
                  if(doc && doc.role==='trainer'){
                    const theme = getTrainerTheme(0);
                    setTrainer({...doc,...theme});
                    setUser(null);
                  }
                }catch(e){ console.warn('trainer session restore:',e); }
              }
            }
          }catch(e){ console.warn('session restore error',e); }
          setAuthReady(true);
        });
      }catch(e){
        console.warn('Firebase se cargará al iniciar sesión:', e);
        setAuthReady(true);
      }
    }, 18000);

    return ()=>{ cancelled=true; clearTimeout(restoreTimer); if(typeof unsubAuth==='function')unsubAuth(); };
  },[]);

  // Derivar pantalla del estado, no de una variable separada
  const scr = !authReady ? 'splash'
    : trainer ? 'trainer'
    : user    ? 'home'
    : 'choose';
  const setScr = (s)=>{ if(s==='choose'||s==='login'||s==='trainer_login') _setNavScr(s); };
  const [navScr, _setNavScr] = useState(null);
  const efectiveScr = (navScr && !trainer && !user) ? navScr : scr;

  // Real-time profile listener — actualiza sin cerrar sesión
  useEffect(()=>{
    if(!user || !user.uid) return;
    const unsub = DB.watchUserProfile(user.uid, data=>{
      setUser(prev=>prev?{...prev,...data}:data);
    });
    return ()=>{ if(typeof unsub==='function') unsub(); };
  },[user&&user.uid]);

  // Activity ping
  useEffect(()=>{
    if(!user || !user.uid) return;
    DB.updateActivity(user.uid, user.name);
    const iv = setInterval(()=>DB.updateActivity(user.uid, user.name), 30000);
    return ()=>clearInterval(iv);
  },[user&&user.uid]);

  async function logout(){
    const email = localStorage.getItem('sc_current_session');
    if(email) await DB.logoutUser(email);
    localStorage.removeItem('sc_current_session');
    setUser(null); setTrainer(null); _setNavScr(null);
  }

  if(efectiveScr==='splash') return React.createElement(Splash);
  if(efectiveScr==='trainer') return React.createElement(TrainerPanel,{trainer,onLogout:logout});
  if(efectiveScr==='home')    return React.createElement(HomeScreen,{user,onLogout:logout,updateUser:setUser});
  if(efectiveScr==='login')   return React.createElement(LoginScreen,{onBack:()=>_setNavScr(null),onLogin:(tr,u)=>{if(tr){setTrainer(tr);setUser(null);}else{setUser(u);setTrainer(null);}}});
  if(efectiveScr==='trainer_login') return React.createElement(TrainerLoginScreen,{onBack:()=>_setNavScr(null),onLogin:(tr,u)=>{if(tr){setTrainer(tr);setUser(null);}else{setUser(u);setTrainer(null);}}});
  // choose
  return React.createElement(ChooseScreen,{onUser:()=>_setNavScr('login'),onTrainer:()=>_setNavScr('trainer_login')});
}

          accessStatus: 'active',

      }else{

          trainerDoc = {...trainerDoc, uid, email: trainerEmail, name: trainerDoc.name || 'Salva Coach', role:'trainer', pin:cleanPin, accessStatus:'active', profileStatus:'complete', updatedAt:Date.now()};
          await ref.set(trainerDoc, {merge:true});
        }
      }

      localStorage.setItem('sc_current_session', trainerEmail);
      const theme = getTrainerTheme(0);
      if(onLogin) onLogin({...trainerDoc,...theme}, null);

      setLoading(false);

// ─── EXERCISE SCREEN ──────────────────────────────────────────────────────────
function ExerciseScreen({user,day,exercise:ex,routine,onBack}){
  const today=new Date().toISOString().slice(0,10);

  const [log,setLog]=useState(null);
  const [note,setNote]=useState('');
  const [exInfo,setExInfo]=useState(null);
  const [helpSent,setHelpSent]=useState(false);
  const [helping,setHelping]=useState(false);
  const [restTimer,setRestTimer]=useState(null);
  const [localSets,setLocalSets]=useState(parseInt(ex.sets)||3);
  const [localReps,setLocalReps]=useState(parseInt(ex.reps)||10);
  const [localRest,setLocalRest]=useState(parseInt(ex.rest)||60);

  const restRef=React.useRef(null);

  // Cargar log + nota + info del ejercicio
  useEffect(()=>{
    async function load(){
      const l=await DB.getExerciseLog(user.uid,ex.id,today);
      if(l){setLog(l);}
      else{setLog({sets:Array.from({length:localSets},(_,i)=>({reps:localReps,done:false,repsDone:localReps})),allDone:false});}
      const n=await DB.getNote(user.uid,ex.id);
      setNote(n||'');
      const info=await DB.getExInfo(ex.id);
      setExInfo(info||null);
    }
    load();
    return()=>{if(restRef.current)clearInterval(restRef.current);};
  },[ex.id]);

  function startRest(sec){
    if(restRef.current)clearInterval(restRef.current);
    setRestTimer(sec);
    restRef.current=setInterval(()=>{
      setRestTimer(p=>{
        if(p<=1){clearInterval(restRef.current);setRestTimer(null);return 0;}
        return p-1;
      });
    },1000);
  }

  async function maybeAutoCompleteDay(currentExerciseId, currentLog){
    if(!routine || routine.length===0 || !currentLog || !currentLog.allDone)return;
    try{
      let completed=0;
      for(const rex of routine){
        const l = rex.id===currentExerciseId ? currentLog : await DB.getExerciseLog(user.uid,rex.id,today);
        if(l && l.allDone)completed++;
      }
      if(completed===routine.length){
        await DB.setAtt(user.uid,day,'done');
      }
    }catch(e){console.warn('No se pudo autocompletar el día:',e);}
  }

  async function toggleSet(i){
    if(!log)return;
    const wasDown=!log.sets[i].done;
    const newSets=log.sets.map((s,idx)=>idx===i?{...s,done:!s.done}:s);
    const allDone=newSets.every(s=>s.done);
    const nl={...log,sets:newSets,allDone};
    setLog(nl);
    await DB.saveExerciseLog(user.uid,ex.id,today,nl);
    if(allDone)await maybeAutoCompleteDay(ex.id,nl);
    if(wasDown)startRest(localRest);
  }

  async function updateRepsDone(i,val){
    if(!log)return;
    const newSets=log.sets.map((s,idx)=>idx===i?{...s,repsDone:parseInt(val)||0}:s);
    const nl={...log,sets:newSets,allDone:newSets.every(s=>s.done)};
    setLog(nl);
    await DB.saveExerciseLog(user.uid,ex.id,today,nl);
  }

  async function changeSets(delta){
    const ns=Math.max(1,localSets+delta);
    setLocalSets(ns);
    const newSets=Array.from({length:ns},(_,i)=>(log && log.sets ? log.sets[i] : null)||{reps:localReps,done:false,repsDone:localReps});
    const nl={...(log||{}),sets:newSets,allDone:newSets.every(s=>s.done)};
    setLog(nl);
    await DB.saveExerciseLog(user.uid,ex.id,today,nl);
  }

  async function sendHelp(){
    setHelping(true);
    try{
      await DB.postHelp({userId:user.uid,userName:user.name,day:DAY_LABELS[day],
        exercise:ex.name,exerciseId:ex.id,
        exercisesTotal:routine.length,
        age:user.age,cond:user.cond});
      setHelpSent(true);
    }catch(e){}
    setHelping(false);
  }

  function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  const c=exColor(ex.id);

  return React.createElement('div',{className:'scr'},
    React.createElement('div',{className:'wfc-top'},React.createElement('div',{className:'wfc-top-txt'},'Salva Coach')),
    React.createElement('div',{className:'hdr'},
      React.createElement('button',{className:'hdr-back',onClick:onBack},'Volver'),
      React.createElement('div',{className:'hdr-title'},ex.id),
      React.createElement('div',{style:{fontSize:10,fontWeight:700,color:c}},ex.zone||'')
    ),
    React.createElement('div',{className:'scrollable',style:{padding:14,background:'#050505'}},

      // Cabecera del ejercicio
      React.createElement('div',{style:{
        display:'flex',gap:14,alignItems:'center',
        background:'#101113',borderRadius:18,padding:14,
        border:'1.5px solid '+c+'44',marginBottom:12,
        borderLeft:'4px solid '+c
      }},
        React.createElement('div',{style:{width:72,height:72,borderRadius:14,overflow:'hidden',background:'#050505',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid '+c+'33'}},
          getExerciseImage(ex,exInfo)?
            React.createElement('img',{loading:'lazy',decoding:'async',src:getExerciseImage(ex,exInfo),style:{width:'100%',height:'100%',objectFit:'contain'}}):
            React.createElement('img',{loading:'lazy',decoding:'async',src:IMG_PLACEHOLDER,style:{width:'100%',height:'100%',objectFit:'contain',opacity:0.4}})
        ),
        React.createElement('div',{style:{flex:1}},
          React.createElement('div',{style:{fontWeight:900,fontSize:17,color:'#f8fafc',fontFamily:"'Rajdhani',sans-serif",lineHeight:1.2}},ex.name),
          React.createElement('div',{style:{fontSize:12,color:'#b9bec4',marginTop:4}},localSets+' series × '+localReps+' reps · '+localRest+'s desc')
        )
      ),

      // Nota del entrenador
      note&&React.createElement('div',{style:{
        background:'linear-gradient(135deg,#1a1230,#0f1528)',
        border:'1.5px solid #7c3aed44',borderRadius:14,
        padding:'12px 14px',marginBottom:12,
        display:'flex',gap:10,alignItems:'flex-start'
      }},
        React.createElement('div',{style:{fontSize:20,flexShrink:0,display:"none"}},''),
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:10,fontWeight:900,color:'#a78bfa',letterSpacing:'.08em',marginBottom:4}},'NOTA DEL ENTRENADOR'),
          React.createElement('div',{style:{fontSize:13,color:'#f8fafc',lineHeight:1.5}},note)
        )

function BodyCompositionChart({user,compact=false}){
  user=user||{};
  function num(v){
    if(v===null||v===undefined||v==='')return null;
    const n=parseFloat((''+v).replace(',','.').replace('%',''));
    return isNaN(n)?null:n;
  }
  function nice(n){
    if(n===null&&n!==0)return '';
    return (Math.round(n*10)/10).toString().replace('.',',');
  }
  function clamp(n,min,max){return Math.max(min,Math.min(max,n));}

  const grasaCorporal=num(user.grasaCorporal!==undefined&&user.grasaCorporal!==''?user.grasaCorporal:user.porcentajeGrasa);
  const masaMuscular=num(user.masaMuscular!==undefined&&user.masaMuscular!==''?user.masaMuscular:user.porcentajeMasa);
  const imc=num(user.imc);
  const grasaVisceral=num(user.grasaVisceral);

  const hasPie=(grasaCorporal!==null)||(masaMuscular!==null);
  const hasIndicators=(imc!==null)||(grasaVisceral!==null);
  if(!hasPie&&!hasIndicators)return null;

  let fat=grasaCorporal===null?0:clamp(grasaCorporal,0,100);
  let muscle=masaMuscular===null?0:clamp(masaMuscular,0,100);
  let rest=Math.max(0,100-fat-muscle);

  // Si los porcentajes suman más de 100, se normalizan solo para el dibujo.
  // Los valores reales se mantienen en la leyenda.
  if(fat+muscle>100){
    const scale=100/(fat+muscle);
    fat=fat*scale;
    muscle=muscle*scale;
    rest=0;
  }

  const pieItems=[
    {key:'grasaCorporal',label:'Grasa corporal',value:grasaCorporal,draw:fat,unit:'%',color:'#ff4d6d'},
    {key:'masaMuscular',label:'Masa muscular',value:masaMuscular,draw:muscle,unit:'%',color:'#f8fafc'},
    {key:'otros',label:'Otros componentes',value:Math.round(rest*10)/10,draw:rest,unit:'%',color:'#7c3aed'}
  ].filter(x=>x.key==='otros'||x.value!==null);

  let start=0;
  const segments=pieItems.map(x=>{
    const seg={...x,start,end:start+(x.draw||0)};
    start+=(x.draw||0);
    return seg;
  });
  const gradient=hasPie
    ? 'conic-gradient('+segments.map(s=>`${s.color} ${s.start}% ${s.end}%`).join(', ')+')'
    : 'conic-gradient(#1e3347 0 100%)';

  function LegendItem({item}){
    return React.createElement('div',{style:{
      display:'grid',
      gridTemplateColumns:'12px 1fr auto',
      alignItems:'center',
      gap:8,
      background:'#0d2030',
      border:'1px solid '+item.color+'55',
      borderRadius:10,
      padding:'8px 10px'
    }},
      React.createElement('span',{style:{width:12,height:12,borderRadius:'50%',background:item.color,boxShadow:'0 0 12px '+item.color}}),
      React.createElement('div',null,
        React.createElement('div',{style:{fontSize:11,color:'#f8fafc',fontWeight:900,lineHeight:1.05}},item.label),
        React.createElement('div',{style:{fontSize:9,color:'#b9bec4',fontWeight:700,marginTop:2}},
          item.key==='otros'?'Porción restante del 100%':'Porcentaje ingresado'
        )
      ),
      React.createElement('div',{style:{fontSize:14,color:'#ffffff',fontWeight:900}},
        (item.value===null?'—':nice(item.value))+item.unit
      )
    );
  }

  function Indicator({label,value,color,sub}){
    if(value===null&&value!==0)return null;
    return React.createElement('div',{style:{
      background:'#0d2030',
      border:'1px solid '+color+'66',
      borderRadius:12,
      padding:'10px 12px',
      display:'grid',
      gridTemplateColumns:'12px 1fr auto',
      alignItems:'center',
      gap:8
    }},
      React.createElement('span',{style:{width:12,height:12,borderRadius:'50%',background:color,boxShadow:'0 0 12px '+color}}),
      React.createElement('div',null,
        React.createElement('div',{style:{fontSize:11,color:'#f8fafc',fontWeight:900}},label),
        React.createElement('div',{style:{fontSize:9,color:'#b9bec4',fontWeight:700,marginTop:2}},sub)
      ),
      React.createElement('div',{style:{fontSize:16,color:'#ffffff',fontWeight:900}},nice(value))
    );
  }

  return React.createElement('div',{style:{
      marginTop:14,
      padding:'14px',
      border:'1px solid #d7dade30',
      borderRadius:16,
      background:'#102638'
    }},
    React.createElement('div',{style:{fontSize:10,fontWeight:900,color:'#f8fafc',letterSpacing:'.12em',marginBottom:12}},'COMPOSICIÓN CORPORAL'),
    hasPie&&React.createElement('div',{style:{display:'flex',gap:16,alignItems:'center',justifyContent:'flex-start',flexWrap:'wrap'}},
      React.createElement('div',{style:{
          position:'relative',
          width:compact?132:154,
          height:compact?132:154,
          borderRadius:'50%',
          background:gradient,
          boxShadow:'0 0 28px #d7dade33',
          flex:'0 0 auto'
        }},
        React.createElement('div',{style:{
            position:'absolute',
            inset:compact?23:27,
            borderRadius:'50%',
            background:'#101113',
            display:'flex',
            alignItems:'center',
            justifyContent:'center',
            flexDirection:'column',
            border:'1px solid #d7dade40',
            textAlign:'center'
          }},
          React.createElement('div',{style:{fontSize:compact?20:24,fontWeight:900,color:'#ffffff',lineHeight:1}},(grasaCorporal!==null?nice(grasaCorporal):'—')+'%'),
          React.createElement('div',{style:{fontSize:9,color:'#b9bec4',fontWeight:800,lineHeight:1.1}},'grasa')
        )
      ),
      React.createElement('div',{style:{
          display:'grid',
          gridTemplateColumns:compact?'1fr':'repeat(auto-fit,minmax(180px,1fr))',
          gap:8,
          flex:'1 1 260px',
          minWidth:220
        }},
        pieItems.map(item=>React.createElement(LegendItem,{key:item.key,item}))
      )
    ),
    hasIndicators&&React.createElement('div',{style:{
        display:'grid',
        gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',
        gap:8,
        marginTop:hasPie?12:0
      }},
      React.createElement(Indicator,{label:'IMC',value:imc,color:'#22c55e',sub:'Indicador calculado con peso y estatura'}),
      React.createElement(Indicator,{label:'Grasa visceral',value:grasaVisceral,color:'#f59e0b',sub:'Indicador separado, no porcentaje de la torta'})
    ),
    React.createElement('div',{style:{fontSize:9,color:'#b9bec4',marginTop:10,lineHeight:1.35}},
      'La torta usa solo porcentajes comparables: grasa corporal, masa muscular y otros componentes. IMC y grasa visceral se muestran aparte porque son indicadores, no partes del 100%.'
    )
  );
}

function TrainerPanel({trainer,onLogout}){
  const [users,setUsers]=useState([]);
  const [helpReqs,setHelpReqs]=useState([]);
  const [selUser,setSelUser]=useState(null);
  const [view,setView]=useState('list');
  const [search,setSearch]=useState('');
  const [deletingUser,setDeletingUser]=useState(null);

  // Polling de solicitudes de ayuda (cada 5s)
  useEffect(()=>{
    if(!trainer||!trainer.uid)return;
    // Listener en tiempo real de solicitudes de ayuda (Firestore onSnapshot)
    const unsub = db_fs.collection('helpRequests')
      .where('status','==','pending')
      .onSnapshot(snap=>{
        const reqs = snap.docs.map(d=>d.data())
          .filter(r=>(Date.now()-(r.createdAt||0))<30*60*1000)
          .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
        setHelpReqs(reqs);
      }, err=>console.warn('helpReqs listener error',err));
    return()=>unsub();
  },[trainer&&trainer.uid]);

  // Polling de usuarios (cada 15s)
  useEffect(()=>{
    // Listener en tiempo real de usuarios (Firestore onSnapshot)
    const unsub = db_fs.collection('users')
      .where('role','==','user')
      .onSnapshot(snap=>{
        setUsers(snap.docs.map(d=>d.data()));
      }, err=>console.warn('users listener error',err));
    return()=>unsub();
  },[]);

  async function deleteUser(u){
    const ok=window.confirm('¿Eliminar a '+u.name+' definitivamente?\n\nEsto borrará su perfil, rutinas y notas. No se puede deshacer.');
    if(!ok)return;
    setDeletingUser(u.uid||u.email);
    try{
      await DB.deleteUserData(u.uid||u.email,u.email,trainer);
      setUsers(us=>us.filter(x=>(x.uid||x.email)!==(u.uid||u.email)));
    }catch(e){
      alert('Error al eliminar: '+(e.message||'intenta de nuevo'));
    }
    setDeletingUser(null);
  }

  async function resolveReq(userId){
    try{ await DB.resolveHelp(userId); }
    catch(e){ console.error('resolve error',e); }
  }

  if(view==='ficha'&&selUser) return React.createElement(UserFicha,{user:selUser,trainer,onBack:()=>{setView('list');setSelUser(null);}});

  const filtered=search?users.filter(u=>u.name&&u.name.toLowerCase().includes(search.toLowerCase())):users;


  return React.createElement('div',{className:'scr'},
    React.createElement('div',{className:'wfc-top'},React.createElement('div',{className:'wfc-top-txt'},'Salva Coach')),

    try{
      const result=await DB.uploadAvatar(u.email,file);
      // Si usó Storage, guardar URL; si base64, guardar data URL
      setPDraft(d=>({...d,avatar:result.url,avatarType:result.type}));
    }catch(err){
      // Fallback a base64 si hay error
      if(file.size>500000){alert('Error al subir la imagen. Intenta con una más pequeña (máx 500 KB).');return;}
      const reader=new FileReader();
      reader.onload=ev=>setPDraft(d=>({...d,avatar:ev.target.result,avatarType:'base64'}));

          ),

            React.createElement('div',{style:{width:36,height:36,borderRadius:8,background:exColor(ex.id)+'22',border:'1px solid '+exColor(ex.id)+'33',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:900,color:exColor(ex.id)}},

}

// ─── DAY EDIT (trainer edits user routine) ────────────────────────────────────
function DayEditTrainer({user:u,trainer,day,exercises,notes,onBack,onSave,onUpdateEx,onSetRtn,onSaveNote}){
  const [tab,setTab]=useState('exercises'); // exercises | add
  const [openCat,setOpenCat]=useState(null);
  const [noteEditing,setNoteEditing]=useState(null); // exerciseId
  const [noteDraft,setNoteDraft]=useState('');
  const [exEditing,setExEditing]=useState(null); // exerciseId for global info edit
  const [exInfoDraft,setExInfoDraft]=useState({links:[],description:''}); // draft glo
  const [exEditErr,setExEditErr]=useState(''); // error al abrir/guardar info ejerciciobal info (links: [{url,label}])
  const [exInfoCache,setExInfoCache]=useState({}); // exId -> info from Firestore
  const [savingEx,setSavingEx]=useState(false);
  const [catalogVersion,setCatalogVersion]=useState(0);
  const [newExOpen,setNewExOpen]=useState(false);
  const [newExDraft,setNewExDraft]=useState(defaultNewExerciseDraft());
  const [savingNewEx,setSavingNewEx]=useState(false);
  const [deletingExId,setDeletingExId]=useState(null);

  // Load global custom exercise catalog and global deletions; keep them synced for all trainers.
  useEffect(()=>{
    let mounted=true;
    function bump(){ if(mounted)setCatalogVersion(v=>v+1); }
    function applyCatalog(customs){
      mergeCustomExercises(customs||[]);
      bump();
    }
    function applyDeleted(ids){
      applyDeletedExerciseIds(ids||[]);
      bump();
    }
    async function loadCustomCatalog(){
      try{
        const customs = await DB.getCustomExercises();
        applyCatalog(customs);
      }catch(e){
        console.warn('custom exercise catalog error:', e);
      }
    }
    async function loadDeletedCatalog(){
      try{
        const ids = await DB.getDeletedExerciseIds();
        applyDeleted(ids);
      }catch(e){
        console.warn('deleted exercise catalog error:', e);
      }
    }
    loadDeletedCatalog();
    loadCustomCatalog();
    const unsubCustom = DB.watchCustomExercises(applyCatalog);
    const unsubDeleted = DB.watchDeletedExercises(applyDeleted);
    return ()=>{
      mounted=false;
      if(typeof unsubCustom==='function')unsubCustom();
      if(typeof unsubDeleted==='function')unsubDeleted();
    };
  },[]);

  // Load exInfo for all exercises in this day
  useEffect(()=>{
    let mounted=true;
    async function loadAllInfo(){
      const cache={};
      for(const ex of exercises){
        try{
          const info=await DB.getExInfo(ex.id);
          if(info)cache[ex.id]=info;
        }catch(e){
          console.warn('getExInfo cache error:', ex.id, e);
        }
      }
      if(mounted) setExInfoCache(cache);
    }
    if(exercises.length)loadAllInfo();
    else setExInfoCache({});
    return ()=>{mounted=false;};
  },[exercises]);

  async function openExEdit(exId){
    setExEditErr('');
    let info;
    try{ info=await DB.getExInfo(exId); }
    catch(e){ setExEditErr('Error al cargar info: '+(e.message||'verifica conexión')); return; }
    const baseEx=exercises.find(e=>e.id===exId)||{};
    let links=[];
    if(!info){
      // Nunca editado: pre-cargar links originales del catálogo para comodidad
      const defaultLabels=['Tutorial principal','Tutorial alternativo','Tutorial extra'];
      [baseEx.video,baseEx.video2,baseEx.video3].forEach((u,i)=>{
        if(u)links.push({url:u,label:defaultLabels[i]});
      });
      if(baseEx.link)links.push({url:baseEx.link,label:baseEx.linkLabel||'Enlace'});
    } else if(Array.isArray(info.links)){
      // Ya fue editado: respetar su lista aunque sea vacía
      links=info.links.map(l=>({url:l.url||'',label:l.label||''}));
    } else {
      // Registro legacy (campos video/video2/video3) → migrar
      const defaultLabels=['Tutorial principal','Tutorial alternativo','Tutorial extra'];
      ['video','video2','video3'].forEach((k,i)=>{
        if(info[k])links.push({url:info[k],label:defaultLabels[i]});
      });
      if(info.link)links.push({url:info.link,label:info.linkLabel||'Enlace del entrenador'});
    }
    setExInfoDraft({name:(info&&info.name)||baseEx.name||'',links,description:info?info.description||'':'',customImg:(info&&info.customImg)||baseEx.customImg||''});
    setExEditing(exId);
  }

  async function saveExInfo(){
    setSavingEx(true);
    try{
      const cleanLinks=(exInfoDraft.links||[]).filter(l=>l.url&&l.url.trim());
      const baseEx=(exercises.find(e=>e.id===exEditing)||{});
      const dataToSave={name:(exInfoDraft.name||'').trim()||baseEx.name||'',links:cleanLinks,description:exInfoDraft.description||'',customImg:exInfoDraft.customImg||''};
      await DB.saveExInfo(exEditing,dataToSave);
      setExInfoCache(c=>({...c,[exEditing]:{...dataToSave}}));
      onSetRtn(rtn=>Array.isArray(rtn)?rtn.map(item=>item&&item.id===exEditing?{...item,name:dataToSave.name||item.name}:item):rtn);
      mergeCustomExercises([{...baseEx,...dataToSave,id:exEditing,category:baseEx.category||baseEx.cat}]);
      setCatalogVersion(v=>v+1);
      setExEditing(null);
    }catch(e){
      console.error('saveExInfo error:',e);
      alert('Error al guardar info: '+(e.message||'verifica conexión'));
    }
    setSavingEx(false);
  }

  function removeEx(id){onSetRtn(rtn=>rtn.filter(e=>e.id!==id));}
  function addEx(ex){
    if(exercises.find(e=>e.id===ex.id)){onSetRtn(rtn=>rtn.filter(e=>e.id!==ex.id));return;}
    onSetRtn(rtn=>[...rtn,{...ex,sets:3,reps:10,rest:60}]);
  }

  function handleNewExerciseImageFile(file){
    if(!file)return;
    compressImageFile(file, dataUrl=>setNewExDraft(d=>({...d,image:dataUrl})), ()=>alert('No se pudo cargar la imagen.'));
  }

  function handleEditExerciseImageFile(file){
    if(!file)return;
    compressImageFile(file, dataUrl=>setExInfoDraft(d=>({...d,customImg:dataUrl})), ()=>alert('No se pudo cargar la imagen.'));
  }

  async function createNewExercise(){
    const name=(newExDraft.name||'').trim();
    const category=newExDraft.category;
    if(!name){ alert('Escribe el nombre del ejercicio.'); return; }
    if(!category || !CAT[category]){ alert('Selecciona una categoría válida.'); return; }
    setSavingNewEx(true);
    try{
      const id='C'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,6).toUpperCase();
      const link=(newExDraft.link||'').trim();
      const image=(newExDraft.image||'').trim();
      const ex={
        id, name, category, custom:true, customImg:image,
        zone:'Personalizado', machine:'Personalizado', video:link
      };
      const info={
        ...ex,
        isCustomExercise:true,
        links:link?[{url:link,label:'Tutorial principal'}]:[],
        description:(newExDraft.description||'').trim(),
        createdBy:(trainer&&trainer.uid)||(trainer&&trainer.email)||'',
        createdAt:Date.now()
      };
      await DB.saveCustomExercise(ex,info);
      mergeCustomExercises([info]);
      setExInfoCache(c=>({...c,[id]:info}));
      setCatalogVersion(v=>v+1);
      setOpenCat(category);
      setNewExDraft(defaultNewExerciseDraft());
      setNewExOpen(false);
      setTab('add');
      alert('Ejercicio creado en el catálogo global. Para asignarlo, selecciónalo en la categoría correspondiente y luego guarda la rutina del cliente.');
    }catch(e){
      console.error('createNewExercise error:',e);
      alert('Error al crear el ejercicio: '+(e.message||'verifica conexión'));
    }
    setSavingNewEx(false);
  }

  async function deleteExerciseFromApp(ex){
    if(!ex || !ex.id)return;
    const msg = '¿Eliminar "'+(ex.name||ex.id)+'" del catálogo global de la app?\n\nDesaparecerá para entrenadores y clientes al volver a cargar/entrar. Si estaba en esta rutina, también se quitará aquí.';
    if(!confirm(msg))return;
    setDeletingExId(ex.id);
    try{
      await DB.deleteExerciseFromApp(ex);
      applyDeletedExerciseIds([ex.id]);
      setExInfoCache(c=>{ const n={...c}; delete n[ex.id]; return n; });
      onSetRtn(rtn=>Array.isArray(rtn)?rtn.filter(item=>item&&item.id!==ex.id):rtn);
      if(exEditing===ex.id)setExEditing(null);
      setCatalogVersion(v=>v+1);
      alert('Ejercicio eliminado del catálogo global.');
    }catch(e){
      console.error('deleteExerciseFromApp error:', e);
      alert('No se pudo eliminar el ejercicio: '+(e.message||'verifica conexión y permisos de Firestore'));
    }
    setDeletingExId(null);
  }

  return React.createElement('div',{className:'scr'},
    React.createElement('div',{className:'wfc-top'},React.createElement('div',{className:'wfc-top-txt'},'Salva Coach')),
    React.createElement('div',{className:'hdr'},
      React.createElement('button',{className:'hdr-back',onClick:onBack},'Volver'),
      React.createElement('div',{className:'hdr-title'},'RUTINA '+DAY_LABELS[day].toUpperCase())
    ),
    // Trainer banner
    React.createElement('div',{style:{background:'#101113',borderBottom:'1px solid '+trainer.color+'33',padding:'6px 14px',fontSize:11,color:trainer.color,fontWeight:700,flexShrink:0}},
      'Editando rutina de: '+u.name
    ),
    // Tabs
    React.createElement('div',{style:{display:'flex',background:'#101113',borderBottom:'1px solid #d7dade20',flexShrink:0}},
      [{id:'exercises',label:'Ejercicios ('+exercises.length+')'},{id:'add',label:'+ Añadir ejercicio'}].map(t=>
        React.createElement('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:'10px',border:'none',background:'transparent',fontWeight:700,fontSize:12,color:tab===t.id?trainer.color:'#b9bec4',borderBottom:'2px solid '+(tab===t.id?trainer.color:'transparent'),cursor:'pointer'}},t.label)
      )
    ),
    React.createElement('div',{className:'scrollable',style:{padding:14,background:'#050505'}},
      tab==='exercises'&&React.createElement('div',null,
        exercises.length===0&&React.createElement('div',{style:{textAlign:'center',color:'#b9bec4',padding:20}},'Sin ejercicios. Añade desde la pestaña +'),
        exercises.map((ex,i)=>React.createElement('div',{key:ex.id,className:'card',style:{padding:0,overflow:'hidden',marginBottom:10}},
          // Exercise header
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px'}},
            React.createElement('div',{style:{width:40,height:40,borderRadius:8,background:exColor(ex.id)+'22',border:'1px solid '+exColor(ex.id)+'33',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900,color:exColor(ex.id)}},
              getExerciseImage(ex,exInfoCache[ex.id])?React.createElement('img',{loading:'lazy',decoding:'async',src:getExerciseImage(ex,exInfoCache[ex.id]),style:{width:'100%',height:'100%',objectFit:'contain'}}):React.createElement('img',{loading:'lazy',decoding:'async',src:IMG_PLACEHOLDER,style:{width:'100%',height:'100%',objectFit:'contain',opacity:0.4}})
            ),
            React.createElement('div',{style:{flex:1}},
              React.createElement('div',{style:{fontWeight:700,fontSize:13,color:'#f8fafc'}},getExerciseName(ex,exInfoCache[ex.id])),
              // Series/reps controls
              React.createElement('div',{style:{display:'flex',gap:6,marginTop:5,alignItems:'center'}},
                React.createElement('div',{style:{display:'flex',alignItems:'center',gap:4,background:'#101113',border:'1px solid '+trainer.color+'44',borderRadius:7,padding:'2px 6px'}},
                  React.createElement('button',{onClick:()=>onUpdateEx(ex.id,'sets',-1),style:{background:'none',border:'none',color:trainer.color,fontWeight:900,fontSize:16,cursor:'pointer',lineHeight:1,padding:'0 2px'}},'-'),
                  React.createElement('span',{style:{fontSize:11,fontWeight:800,color:trainer.color,minWidth:20,textAlign:'center'}},(ex.sets||3)+' S'),
                  React.createElement('button',{onClick:()=>onUpdateEx(ex.id,'sets',1),style:{background:'none',border:'none',color:trainer.color,fontWeight:900,fontSize:16,cursor:'pointer',lineHeight:1,padding:'0 2px'}},'+')
                ),
                React.createElement('span',{style:{color:'#b9bec4',fontSize:12}},'×'),
                React.createElement('div',{style:{display:'flex',alignItems:'center',gap:4,background:'#101113',border:'1px solid '+trainer.color+'44',borderRadius:7,padding:'2px 6px'}},
                  React.createElement('button',{onClick:()=>onUpdateEx(ex.id,'reps',-1),style:{background:'none',border:'none',color:trainer.color,fontWeight:900,fontSize:16,cursor:'pointer',lineHeight:1,padding:'0 2px'}},'-'),
                  React.createElement('span',{style:{fontSize:11,fontWeight:800,color:trainer.color,minWidth:20,textAlign:'center'}},(ex.reps||10)+' R'),
                  React.createElement('button',{onClick:()=>onUpdateEx(ex.id,'reps',1),style:{background:'none',border:'none',color:trainer.color,fontWeight:900,fontSize:16,cursor:'pointer',lineHeight:1,padding:'0 2px'}},'+')

            React.createElement('button',{onClick:()=>removeEx(ex.id),style:{background:'#3d0d0d',border:'1px solid #ef444444',borderRadius:6,padding:'4px 8px',color:'#ef4444',fontSize:11,fontWeight:700,cursor:'pointer'}},'✕')
          ),
// Editar info global del ejercicio
          exEditing===ex.id?

              React.createElement('div',{style:{fontSize:10,fontWeight:900,color:'#d7dade',letterSpacing:'.08em',marginBottom:8}},'INFO GLOBAL DEL EJERCICIO'),
              React.createElement('div',{style:{fontSize:11,color:'#b9bec4',marginBottom:10}},'Aplica para todos los clientes con este ejercicio.'),
              React.createElement('div',{style:{marginBottom:10}},
                React.createElement('div',{style:{fontSize:10,fontWeight:700,color:'#b9bec4',marginBottom:4}},'NOMBRE DEL EJERCICIO'),
                React.createElement('input',{
                  value:exInfoDraft.name||'',
                  onChange:e=>setExInfoDraft(d=>({...d,name:e.target.value})),

                  style:{width:'100%',padding:'8px',borderRadius:8,border:'1.5px solid #d7dade30',background:'#101113',fontSize:12,color:'#f8fafc',boxSizing:'border-box',display:'block'}

              // Descripción

                React.createElement('div',{style:{fontSize:10,fontWeight:700,color:'#b9bec4',marginBottom:4}},'DESCRIPCIÓN'),

  }

  function start(){

      showMissingDeps();

  }

  if(document.readyState === 'loading'){
    window.addEventListener('DOMContentLoaded', start);
  }else{
    setTimeout(start,0);
  }
})();

</script>

})();
